# Cloudflare Pages deployment configuration
# This config is for local development with wrangler
# Cloudflare Pages uses its own configuration

name = "live-commerce"
compatibility_date = "2026-04-26"
compatibility_flags = ["nodejs_compat"]

# D1 Database bindings
[[d1_databases]]
binding = "DB"
database_name = "livecom-db"
database_id = "scommerce-db-id"

# R2 Storage for file uploads
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "scommerce-uploads"

# KV Namespace for rate limiting and caching
[[kv_namespaces]]
binding = "KV"
id = "scommerce-kv"

[observability]
enabled = true
